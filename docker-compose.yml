version: "3.9"

services:
  assistantx:
    build: .
    container_name: assistantx
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount the host Docker socket so AssistantX can spin up OpenClaw containers
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # DO Gradient AI (serverless inference)
      - DO_GRADIENT_API_KEY=${DO_GRADIENT_API_KEY}
      - DO_GRADIENT_BASE_URL=${DO_GRADIENT_BASE_URL:-https://inference.do-ai.run/v1}
      - DO_GRADIENT_MODEL=${DO_GRADIENT_MODEL:-llama3.3-70b-instruct}
      # DO Gradient AI (dedicated inference — GPU, optional)
      - DO_GRADIENT_DEDICATED_ENDPOINT=${DO_GRADIENT_DEDICATED_ENDPOINT:-}
      - DO_GRADIENT_DEDICATED_TOKEN=${DO_GRADIENT_DEDICATED_TOKEN:-}
      # DO Spaces (audit log)
      - DO_SPACES_ENDPOINT=${DO_SPACES_ENDPOINT:-https://nyc3.digitaloceanspaces.com}
      - DO_SPACES_KEY=${DO_SPACES_KEY}
      - DO_SPACES_SECRET=${DO_SPACES_SECRET}
      - DO_SPACES_BUCKET=${DO_SPACES_BUCKET:-assistantx-audit}
      - DO_SPACES_REGION=${DO_SPACES_REGION:-nyc3}
      # OpenClaw instance config
      - OPENCLAW_IMAGE=${OPENCLAW_IMAGE:-node:22-slim}
      - OPENCLAW_NETWORK=assistantx_net
      - INSTANCE_PORT_START=${INSTANCE_PORT_START:-19000}
      - PROXY_PORT_START=${PROXY_PORT_START:-20000}
      - MAX_INSTANCES=${MAX_INSTANCES:-10}
    networks:
      - assistantx_net

networks:
  assistantx_net:
    name: assistantx_net
    driver: bridge
